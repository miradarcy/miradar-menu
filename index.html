<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiraDar — Breakfast Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#FAF7F2;--warm-white:#FFFCF8;--gold:#B8955A;--gold-light:#D4B07A;
  --gold-pale:#F0E5CC;--dark:#1E1A15;--mid:#5C5040;--muted:#9B8B78;
  --border:rgba(184,149,90,0.22);--tag-bg:rgba(184,149,90,0.10);
}
body{font-family:'Raleway',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;}
header{background:var(--dark);padding:2.5rem 2rem 2rem;text-align:center;}
header::after{content:'';display:block;width:50px;height:1px;background:var(--gold);margin:1rem auto 0;}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:600;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;}
.logo-sub{font-size:0.6rem;font-weight:500;letter-spacing:0.35em;color:var(--muted);text-transform:uppercase;margin-top:0.3rem;}
.menu-label{display:inline-block;margin-top:1.1rem;font-size:0.58rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold-light);border:0.5px solid rgba(184,149,90,0.5);padding:4px 14px;border-radius:2px;}
.controls{background:var(--warm-white);border-bottom:0.5px solid var(--border);padding:1rem 1.5rem;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;}
.filter-btn{font-family:'Raleway',sans-serif;font-size:0.58rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;padding:5px 13px;border:0.5px solid var(--border);border-radius:2px;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.18s;}
.filter-btn:hover{color:var(--gold);border-color:var(--gold);}
.filter-btn.active{background:var(--dark);color:var(--gold);border-color:var(--dark);}
.search-input{font-family:'Raleway',sans-serif;font-size:0.78rem;color:var(--dark);background:var(--cream);border:0.5px solid var(--border);border-radius:2px;padding:7px 14px;width:230px;outline:none;transition:border-color 0.2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--gold);}
main{padding:1.8rem 1.5rem;max-width:1020px;margin:0 auto;}
.sec-hdr{margin-bottom:1.3rem;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:0.7rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);}
.sec-line{width:100%;height:0.5px;background:var(--border);margin:0.4rem 0 1.3rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:14px;margin-bottom:2.5rem;}
.card{background:var(--warm-white);border:0.5px solid var(--border);border-radius:4px;padding:1.2rem 1.2rem 1rem;transition:border-color 0.18s,transform 0.15s;position:relative;overflow:hidden;}
.card:hover{border-color:var(--gold);transform:translateY(-2px);}
.card-bar{position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gold-pale);transition:background 0.18s;}
.card:hover .card-bar{background:var(--gold);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:0.1rem;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--dark);line-height:1.25;flex:1;}
.card-price{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:500;color:var(--gold);white-space:nowrap;padding-top:2px;}
.card-name-ru{font-family:'Cormorant Garamond',serif;font-size:0.8rem;font-style:italic;color:var(--muted);margin-bottom:0.75rem;}
.card-divider{width:22px;height:0.5px;background:var(--gold-light);margin-bottom:0.7rem;}
.ing-label{font-size:0.52rem;font-weight:700;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);margin-bottom:0.32rem;}
.ing-text{font-size:0.78rem;line-height:1.65;color:var(--mid);}
.choice-label{font-size:0.52rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:0.65rem;margin-bottom:0.28rem;}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:0.75rem;}
.tag{font-size:0.52rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:2px;background:var(--tag-bg);color:var(--gold);border:0.5px solid var(--border);}
.tag.opt{background:rgba(80,100,80,0.07);color:rgba(50,80,50,0.85);border-color:rgba(80,120,80,0.2);}
.no-results{text-align:center;padding:3rem;font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--muted);}
.extras-card{background:var(--warm-white);border:0.5px solid var(--border);border-radius:4px;padding:1.1rem 1.2rem;max-width:280px;}
.extras-title{font-size:0.58rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:0.75rem;}
.extra-row{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--mid);padding:4px 0;border-bottom:0.5px solid var(--border);}
.extra-row:last-child{border-bottom:none;}
.extra-row span:last-child{color:var(--gold);font-weight:500;}
footer{text-align:center;padding:1.5rem;border-top:0.5px solid var(--border);font-size:0.6rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
.allergy-note{text-align:center;padding:0.8rem 1.5rem;font-size:0.68rem;color:var(--muted);line-height:1.7;}
</style>
</head>
<body>
<header>
  <div class="logo-text">MiraDar</div>
  <div class="logo-sub">Limassol · Cyprus</div>
  <div class="menu-label">All Day Breakfast — Ingredients</div>
</header>
<div class="controls">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="eggs">Eggs</button>
  <button class="filter-btn" data-filter="pancakes">Pancakes & Sweet</button>
  <button class="filter-btn" data-filter="dumplings">Dumplings</button>
  <button class="filter-btn" data-filter="toasts">Sandwiches & Toasts</button>
  <button class="filter-btn" data-filter="special">Special</button>
  <input class="search-input" type="text" placeholder="Search dish or ingredient…" id="search" />
</div>
<main id="main"></main>
<div class="allergy-note">Please inform our staff of any allergies before ordering.<br>Пожалуйста сообщите нам о своих аллергиях</div>
<footer>Kolonakiou 38 &nbsp;·&nbsp; Georgiou A' 103 &nbsp;·&nbsp; Limassol, Cyprus</footer>

<script>
const menu = [
  {
    id:"eggs",
    section:"Eggs / Яйца",
    items:[
      {
        name:"Scramble, Salad & Guacamole",
        nameRu:"Скрэмбл с салатом и гуакамоле",
        price:"€10.95",
        ingredients:"Scrambled eggs, mixed leaf salad, avocado guacamole, arugula — served with your choice of protein",
        choice:["Salmon","Prawns","Sausage","Halloumi"],
        tags:[]
      },
      {
        name:"Omelette, Salad & Guacamole",
        nameRu:"Омлет с салатом и гуакамоле",
        price:"€10.95",
        ingredients:"Egg omelette, mixed leaf salad, avocado guacamole — served with your choice of filling",
        choice:["Mushrooms","Prawns","Stracciatella","Salmon"],
        tags:[]
      },
      {
        name:"Egg White Omelette",
        nameRu:"Белковый Омлет",
        price:"€10.95",
        ingredients:"Egg whites, guacamole, cherry tomatoes",
        choice:[],tags:["light","high-protein"]
      },
      {
        name:"Veggie Eggs with Zucchini",
        nameRu:"Яйца с Цукини",
        price:"€8.95",
        ingredients:"Eggs, courgette (zucchini), olive oil, herbs, salt, pepper",
        choice:[],tags:["vegetarian"]
      },
      {
        name:"Old School Breakfast — Egg, Homemade Sausage",
        nameRu:"Завтрак олд-скул, глазунья, домашняя колбаса",
        price:"€10.95",
        ingredients:"Fried eggs, Parmesan, homemade chicken sausage",
        choice:[],tags:["classic"]
      },
      {
        name:"Kids Breakfast — Sausages & Eggs",
        nameRu:"Детский Завтрак, сосиски, яйца",
        price:"€10.95",
        ingredients:"Chicken sausages, cucumber, tomato, boiled egg, salt, olive oil",
        choice:[],tags:["kids"]
      }
    ]
  },
  {
    id:"pancakes",
    section:"Pancakes & Sweet / Блины и Сладкое",
    items:[
      {
        name:"Oatmeal with Coconut Milk",
        nameRu:"Овсянка на кокосовом молоке",
        price:"€8.95",
        ingredients:"Oatmeal with coconut milk, fresh berries, nuts, honey",
        choice:[],tags:["vegetarian","vegan option"]
      },
      {
        name:"Syrniki with Salted Caramel",
        nameRu:"Сырники с солёной карамелью",
        price:"€8.95",
        ingredients:"Cottage cheese pancakes with salted caramel sauce, berry purée and fresh berries",
        choice:[],tags:["signature","vegetarian"]
      },
      {
        name:"Pancakes — Cottage Cheese & Berries",
        nameRu:"Блины с творогом и ягодами",
        price:"€8.95",
        ingredients:"Thin pancakes with cottage cheese filling, fresh berries, sour cream",
        choice:[],tags:["vegetarian","signature"]
      },
      {
        name:"Pancakes — Red Caviar & Salmon",
        nameRu:"Блины с красной икрой и лососем",
        price:"€16.95",
        ingredients:"Pancakes, red caviar, salmon, Philadelphia cheese, arugula, salt",
        choice:[],tags:["premium","signature"]
      },
      {
        name:"Savoury Oatmeal with Mushrooms",
        nameRu:"Овсянка с грибами",
        price:"€8.95",
        ingredients:"Oats, seasonal mushrooms, herbs, seasoning",
        choice:[],tags:["vegetarian"]
      }
    ]
  },
  {
    id:"dumplings",
    section:"Dumplings / Пельмени и Вареники",
    items:[
      {
        name:"Vareniki with Cherry",
        nameRu:"Вареники с вишней",
        price:"€10.95",
        ingredients:"Dumpling dough, sour cherry filling — topped with seasonal berries, mint and honey",
        choice:[],tags:["vegetarian","sweet"]
      },
      {
        name:"Vareniki — Potato & Mushrooms",
        nameRu:"Вареники с картошкой и грибами",
        price:"€10.95",
        ingredients:"Dumpling dough, potato & mushroom filling — served with fried salo, onions, King Oyster Eryngii mushrooms (or chanterelle), truffle oil and sour cream",
        choice:[],tags:["vegetarian","hearty"]
      },
      {
        name:"Kids Pelmeni with Chicken",
        nameRu:"Детские пельмени с курицей",
        price:"€10.95",
        ingredients:"Minced chicken, flour, eggs, onion, water, butter, sunflower oil, salt, black pepper — served with sour cream and microgreens",
        choice:[],tags:["kids"]
      }
    ]
  },
  {
    id:"toasts",
    section:"Sandwiches & Toasts / Сендвичи и Тосты",
    items:[
      {
        name:"Avocado Toast",
        nameRu:"Авокадо Тост",
        price:"€9.95",
        ingredients:"Toast with avocado, pesto sauce, eggs, sun-dried tomatoes, salt, pepper, microgreens",
        choice:[],tags:["vegetarian"]
      },
      {
        name:"Spicy Tuna Toast",
        nameRu:"Тост с острым тунцом",
        price:"€10.95",
        ingredients:"Yeast-free bread, avocado, Philadelphia cheese, tomatoes, tuna, jalapeño peppers",
        choice:[],tags:[]
      },
      {
        name:"Japanese Style Croissant",
        nameRu:"Круасан в японском стиле",
        price:"€9.95",
        ingredients:"Croissant, 2-egg scramble, Philadelphia cheese, chives",
        choice:["Salmon +€6.00","Prawns +€7.00"],
        tags:["signature"]
      },
      {
        name:"Toast — Stracciatella, Salmon & Egg",
        nameRu:"Тост со страчателлой, лососем и яйцом",
        price:"€10.95",
        ingredients:"Whole grain bread, stracciatella, egg, salmon, pesto, microgreens",
        choice:[],tags:["signature"]
      },
      {
        name:"Roast Beef on Rye",
        nameRu:"Рост-биф на ржаном хлебе",
        price:"€10.95",
        ingredients:"Rye bread, roast beef — served with condiments and microgreens",
        choice:[],tags:[]
      },
      {
        name:"Guacamole Toast — Crab & Red Caviar",
        nameRu:"Тост с гуакамоле, крабом и красной икрой",
        price:"€16.95",
        ingredients:"Philadelphia, guacamole, crab meat, red caviar, microgreens",
        choice:[],tags:["premium"]
      }
    ]
  },
  {
    id:"special",
    section:"Special / Эксклюзив",
    items:[
      {
        name:"Imperial Breakfast — Black Caviar, Pancakes, Butter, Boiled Eggs",
        nameRu:"Императорский Завтрак",
        price:"€24.95",
        ingredients:"Delicate pancakes, homemade butter, black caviar, boiled eggs",
        choice:[],tags:["premium","signature"]
      }
    ]
  }
];

const extras = [
  {name:"Egg / Яйцо",price:"+€2.50"},
  {name:"Sausage / Сосиска",price:"+€3.00"},
  {name:"Salmon / Лосось",price:"+€6.00"},
  {name:"Prawns / Креветки",price:"+€7.00"}
];

let activeFilter="all", searchQuery="";

function render(){
  const main=document.getElementById("main");
  main.innerHTML="";
  let total=0;

  menu.forEach(section=>{
    const items=section.items.filter(item=>{
      const mf=activeFilter==="all"||section.id===activeFilter;
      const q=searchQuery.toLowerCase();
      const ms=!q||item.name.toLowerCase().includes(q)||(item.nameRu&&item.nameRu.toLowerCase().includes(q))||item.ingredients.toLowerCase().includes(q)||(item.choice&&item.choice.some(c=>c.toLowerCase().includes(q)))||item.tags.some(t=>t.toLowerCase().includes(q));
      return mf&&ms;
    });
    if(!items.length)return;
    total+=items.length;

    const wrap=document.createElement("div");
    wrap.innerHTML=`<div class="sec-hdr"><div class="sec-title">${section.section}</div><div class="sec-line"></div></div>`;
    const grid=document.createElement("div");
    grid.className="grid";

    items.forEach(item=>{
      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`<div class="card-bar"></div>
        <div class="card-top"><div class="card-name">${item.name}</div><div class="card-price">${item.price}</div></div>
        ${item.nameRu?`<div class="card-name-ru">${item.nameRu}</div>`:""}
        <div class="card-divider"></div>
        <div class="ing-label">Ingredients</div>
        <div class="ing-text">${item.ingredients}</div>
        ${item.choice&&item.choice.length?`<div class="choice-label">Your choice</div><div class="tags">${item.choice.map(c=>`<span class="tag opt">${c}</span>`).join("")}</div>`:""}
        ${item.tags.length?`<div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`:""}`;
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
    main.appendChild(wrap);
  });

  if(activeFilter==="all"||activeFilter==="toasts"){
    const ew=document.createElement("div");
    ew.style.marginBottom="2rem";
    ew.innerHTML=`<div class="sec-hdr"><div class="sec-title">Extras / Экстра</div><div class="sec-line"></div></div>`;
    const ec=document.createElement("div");
    ec.className="extras-card";
    ec.innerHTML=`<div class="extras-title">Add-ons</div>`+extras.map(e=>`<div class="extra-row"><span>${e.name}</span><span>${e.price}</span></div>`).join("");
    ew.appendChild(ec);
    main.appendChild(ew);
  }

  if(!total)main.innerHTML=`<div class="no-results">No items found for "${searchQuery}"</div>`;
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter=btn.dataset.filter;
    render();
  });
});
document.getElementById("search").addEventListener("input",e=>{searchQuery=e.target.value;render();});
render();
</script>
</body>
</html>
